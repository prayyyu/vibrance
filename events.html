<!DOCTYPE html>
<html>
<head>
  <title>VIBRANCE Events</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Upcoming VIBRANCE Events</h1>

<div class="search-box">
<input 
type="text" 
id="searchInput" 
placeholder="Search events..." 
onkeyup="searchEvents()">
</div>

<!-- FILTER BUTTONS -->
<div class="filter-buttons">
  <button onclick="filterEvents('all')" class="active">All</button>
  <button onclick="filterEvents('onstage')">On Stage</button>
  <button onclick="filterEvents('offstage')">Off Stage</button>
  <button onclick="filterEvents('prestage')">Pre Stage</button>
</div>

<!-- EVENTS WILL LOAD HERE -->
<div class="event-container">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>

<script>

// 🎯 EVENTS DATA
const events = [

  // 🎤 ON STAGE
  { name: "Thiruvathira", date: "Feb 06", time: "09:00 - 10:00", venue: "Main Stage", category: "onstage" },
  { name: "Folk Dance Boys", date: "Feb 06", time: "10:00 - 10:30", venue: "Main Stage", category: "onstage" },
  { name: "Group Dance", date: "Feb 06", time: "10:30 - 11:00", venue: "Main Stage", category: "onstage" },
  { name: "Mime", date: "Feb 06", time: "11:00 - 11:30", venue: "Main Stage", category: "onstage" },

  // 🎭 OFF STAGE
  { name: "Singing Western Solo", date: "Jan 30", time: "1:30 - 2:00", venue: "Seminar Hall", category: "offstage" },
  { name: "Western Solo", date: "Jan 30", time: "2:00 - 2:30", venue: "Seminar Hall", category: "offstage" },
  { name: "Western Group", date: "Jan 30", time: "2:30 - 3:00", venue: "Seminar Hall", category: "offstage" },
  { name: "Debate", date: "Jan 31", time: "3:00 - 4:00", venue: "Seminar Hall", category: "offstage" },

  // 🎬 PRE STAGE
  { name: "Classical Dance", date: "Jan 31", time: "2:00 - 2:30", venue: "Seminar Hall", category: "prestage" },
  { name: "Western Dance", date: "Jan 31", time: "2:30 - 3:00", venue: "Seminar Hall", category: "prestage" },
  { name: "Quiz", date: "Feb 03", time: "9:30 - 10:00", venue: "Seminar Hall", category: "prestage" },
  { name: "Light Music", date: "Feb 03", time: "10:00 - 10:30", venue: "Seminar Hall", category: "prestage" }

];

const container = document.querySelector(".event-container");

// 🔥 LOAD EVENTS
function loadEvents(){

  container.innerHTML = "";

  events.forEach(e => {
    container.innerHTML += `
      <div class="event-card" data-category="${e.category}">
        <h3>${e.name}</h3>
        <p>📅 ${e.date}</p>
        <p>⏰ ${e.time}</p>
        <p>📍 ${e.venue}</p>
        <a href="register.html?event=${e.name}" class="btn">Register →</a>
      </div>
    `;
  });

  applyTilt();
}

// 🔥 FILTER FUNCTION (FIXED)
function filterEvents(type){

  const cards = document.querySelectorAll(".event-card");

  cards.forEach(card => {
    if(type === "all" || card.dataset.category === type){
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });

  // active button
  document.querySelectorAll(".filter-buttons button")
    .forEach(btn => btn.classList.remove("active"));

  event.target.classList.add("active");
}

// 🔥 APPLY TILT
function applyTilt(){
  VanillaTilt.init(document.querySelectorAll(".event-card"),{
    max:15,
    speed:400,
    glare:true,
    "max-glare":0.3
  });
}

// 🔥 INITIAL LOAD
loadEvents();
// 🔍 SEARCH FUNCTION
function searchEvents(){

  const input = document.getElementById("searchInput").value.toLowerCase();

  const cards = document.querySelectorAll(".event-card");

  cards.forEach(card => {

    const title = card.querySelector("h3").innerText.toLowerCase();

    if(title.includes(input)){
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }

  });
}
</script>
</body>
</html>
