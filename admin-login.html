<!DOCTYPE html>
<html>
<head>

<title>Admin Login - VIBRANCE</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="form-container">

<h2>🔐 Admin Login</h2>

<form id="adminLoginForm">

<input id="email" type="email" placeholder="Admin Email" required>

<input id="password" type="password" placeholder="Password" required>

<button type="submit">Login as Admin</button>

<p id="msg" style="margin-top:10px;"></p>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDM-RJYuTB1-qHU75cBJOVL_W_EpQShr_Q",
  authDomain: "vibrance-fest-1310a.firebaseapp.com",
  projectId: "vibrance-fest-1310a"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🎯 ELEMENTS
const form = document.getElementById("adminLoginForm");
const msg = document.getElementById("msg");

// 🚀 LOGIN LOGIC
form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  msg.innerText = "Checking admin access...";

  try {

  // 🔥 STEP 1: clear old session
  await signOut(auth);

  // 🔐 STEP 2: login
  await signInWithEmailAndPassword(auth, email, password);

  // 🔥 STEP 3: wait for correct user
  const user = auth.currentUser;

  if (!user) {
    msg.innerText = "Auth error, try again";
    return;
  }

  console.log("Logged UID:", user.uid);

  // 🔍 STEP 4: check admin role
  const docRef = doc(db, "users", user.uid);
  const docSnap = await getDoc(docRef);

  console.log("Firestore:", docSnap.data());

  if (docSnap.exists() && docSnap.data().isAdmin === true) {

    msg.innerText = "✔ Admin login successful";

    window.location.replace("admin.html");

  } else {

    msg.innerText = "❌ Access denied (Not Admin)";
    await signOut(auth);
  }

} catch (error) {
  msg.innerText = error.message;
}

});

</script>

</body>
</html>
