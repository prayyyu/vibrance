<!DOCTYPE html>
<html>
<head>
<title>Signup - VIBRANCE</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="form-container">

<h2>Signup</h2>

<form id="signupForm">

<label>Name</label>
<input id="name" type="text" required>

<label>Register Number</label>
<input id="reg" type="text" required>

<label>Email</label>
<input id="email" type="email" required>

<label>Password</label>
<input id="password" type="password" required>

<button type="submit">Sign Up</button>

<p id="msg"></p>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDM-RJYuTB1-qHU75cBJOVL_W_EpQShr_Q",
  authDomain: "vibrance-fest-1310a.firebaseapp.com",
  projectId: "vibrance-fest-1310a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById("signupForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {

e.preventDefault();

const name = document.getElementById("name").value;
const reg = document.getElementById("reg").value;
const dept = reg.match(/(CS|ME|EC|EE|AD|CE)/)[0];
const regPattern = /^(VIB|LVIB)[0-9]{2}(CS|ME|EC|EE|AD|CE)[0-9]{3}$/;

if (!regPattern.test(reg)) {
  msg.innerText = "❌ Invalid Register Number (VIB23CS001 or LVIB23CS001)";
  return;
}
// ✅ Extract year
const year = reg.startsWith("LVIB") 
  ? reg.substring(4,6) 
  : reg.substring(3,5);

// 🎯 Allowed years
const allowedYears = ["23","24","25","26"];

if (!allowedYears.includes(year)) {
  msg.innerText = "❌ Only 2023–2026 batches allowed";
  return;
}
// 🔒 Check if register number already used
const q = query(collection(db, "users"), where("register", "==", reg));
const snap = await getDocs(q);

if (!snap.empty) {
  alert("❌ This Register Number already has an account!");
  return;
}
const email = document.getElementById("email").value;
// ✅ Email validation
const emailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

if (!emailPattern.test(email)) {
  msg.innerText = "❌ Invalid email! Use proper Gmail (example@gmail.com)";
  return;
}
const password = document.getElementById("password").value;

// 🔐 Basic validation
if(password.length < 6){
  msg.innerText = "❌ Password must be at least 6 characters";
  return;
}

msg.innerText = "Creating account...";

try {

  const userCredential = await createUserWithEmailAndPassword(auth, email, password);
  const user = userCredential.user;

  // 🔥 SEND VERIFICATION EMAIL
  await sendEmailVerification(user);

  await setDoc(doc(db, "users", user.uid), {
    name: name,
    email: email,
    register: reg,
    department: dept,
    isAdmin: false
  });

  // ✅ Better message
  msg.innerText = "📩 Verification email sent! Please check your inbox before login.";
  msg.style.color = "lightgreen";

  // 🔁 Redirect after delay
  setTimeout(() => {
    window.location.href = "login.html";
  }, 2500);

} catch (error) {

  console.error(error);
  msg.innerText = "❌ " + error.message;

}
</script>
</body>
</html>
