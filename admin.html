<!DOCTYPE html>
<html>

<head>

<title>VIBRANCE Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:30px;
}

h1{
text-align:center;
}

form{
margin-bottom:20px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#007bff;
color:white;
}

</style>

</head>

<body>

<h1>VIBRANCE Admin Dashboard</h1>

<h2>Add Event</h2>

<form id="eventForm">

<input id="eventName" placeholder="Event Name" required>

<input id="eventDate" placeholder="Event Date" required>

<input id="eventVenue" placeholder="Venue" required>

<button type="submit">Add Event</button>

</form>


<h2>Registrations</h2>

<table>

<thead>

<tr>
<th>Name</th>
<th>Register Number</th>
<th>Email</th>
<th>Department</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyDM-RJYuTB1-qHU75cBJOVL_W_EpQShr_Q",
  authDomain: "vibrance-fest-1310a.firebaseapp.com",
  projectId: "vibrance-fest-1310a",
  storageBucket: "vibrance-fest-1310a.firebasestorage.app",
  messagingSenderId: "564934076568",
  appId: "1:564934076568:web:8ef57661b9129d474208ed"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


async function loadData(){

const querySnapshot = await getDocs(collection(db,"registrations"));

querySnapshot.forEach((doc)=>{

const data = doc.data();

const row = `
<tr>
<td>${data.name}</td>
<td>${data.register}</td>
<td>${data.email}</td>
<td>${data.department}</td>
</tr>
`;

document.getElementById("tableBody").innerHTML += row;

});

}

loadData();

</script>

</body>

</html>
