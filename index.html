<!-- JS -->
<script src="js/script.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { 
  getFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs,
  deleteDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyDM-RJYuTB1-qHU75cBJOVL_W_EpQShr_Q",
  authDomain: "vibrance-fest-1310a.firebaseapp.com",
  projectId: "vibrance-fest-1310a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ELEMENTS
const accountBtn = document.getElementById("accountBtn");
const dropdown = document.getElementById("dropdown");

const loginOption = document.getElementById("loginOption");
const signupOption = document.getElementById("signupOption");
const logoutOption = document.getElementById("logoutOption");
const userSection = document.getElementById("userSection");
const userEmail = document.getElementById("userEmail");
const eventList = document.getElementById("eventList");
const eventCount = document.getElementById("eventCount");

const leaderboardContainer = document.getElementById("leaderboardContainer");

// OPEN / CLOSE DROPDOWN
accountBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  dropdown.style.display =
    dropdown.style.display === "block" ? "none" : "block";
});

// CLOSE WHEN CLICK OUTSIDE
document.addEventListener("click", (e) => {
  if (!accountBtn.contains(e.target) && !dropdown.contains(e.target)) {
    dropdown.style.display = "none";
  }
});

// NAVIGATION
loginOption.onclick = () => window.location.href = "login.html";
signupOption.onclick = () => window.location.href = "signup.html";

logoutOption.onclick = () => {
  signOut(auth).then(() => location.reload());
};

// AUTH STATE
onAuthStateChanged(auth, async (user) => {

  if(user){

    loginOption.style.display = "none";
    signupOption.style.display = "none";
    logoutOption.style.display = "block";

    userSection.style.display = "block"; // ✅ ADD THIS

    try {
      const docRefUser = doc(db, "users", user.uid);
      const docSnap = await getDoc(docRefUser);

      if(docSnap.exists()){
        accountBtn.innerText = "👤 " + docSnap.data().name + " ⌄";
      } else {
        accountBtn.innerText = "👤 Account ⌄";
      }

    } catch {
      accountBtn.innerText = "👤 Account ⌄";
    }

    // 🔥 LOAD EVENTS
    loadUserEvents(user.uid, user.email);

  } else {

    loginOption.style.display = "block";
    signupOption.style.display = "block";
    logoutOption.style.display = "none";

    userSection.style.display = "none"; // ✅ ADD THIS

    accountBtn.innerText = "Account ⌄";
  }

});

;

onSnapshot(collection(db, "leaderboard"), (snapshot) => {

  let data = [];

  snapshot.forEach(doc => {
    data.push(doc.data());
  });

  // 🔥 Sort by score
  data.sort((a, b) => b.score - a.score);

  leaderboardContainer.innerHTML = "";

  const medals = ["🥇", "🥈", "🥉"];

  data.forEach((dept, index) => {

   leaderboardContainer.innerHTML += `
  <div class="leaderboard-card">
    <span>${medals[index] ||  + (index+1)}</span>
    <span>${dept.name}</span>
    <span>${dept.score} pts</span>
  </div>
`;

  });

});
// ================= 3D EFFECT =================
setTimeout(() => {
  document.querySelectorAll(".leaderboard-card").forEach(card => {

    card.addEventListener("mousemove", (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const rotateY = (x / rect.width - 0.5) * 20;
      const rotateX = (y / rect.height - 0.5) * -20;

      card.style.transform = `
        scale(1.1)
        rotateX(${rotateX}deg)
        rotateY(${rotateY}deg)
      `;
    });

    card.addEventListener("mouseleave", () => {
      card.style.transform = "";
    });

  });
}, 500);
// =========================
// 🔥 DROPDOWN EVENTS LOGIC
// =========================


async function loadUserEvents(uid, email) {

  userEmail.innerText = email;

  const q = query(collection(db, "registrations"), where("userId", "==", uid));
  const snapshot = await getDocs(q);

  eventList.innerHTML = "";
  let count = snapshot.size;

  eventCount.innerText = `Events: ${count} / 3`;

  if (count === 0) {
    eventList.innerHTML = "<li>No events</li>";
  }

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

   const eventName = data.eventName || data.event || data.title || "Unknown Event";

   const li = document.createElement("li");
   li.innerHTML = `
    ${eventName}
    <button class="cancel-btn">✖</button>
`;

    // cancel button
    li.querySelector("button").onclick = async () => {
      await deleteDoc(doc(db, "registrations", docSnap.id));
      loadUserEvents(uid, email); // refresh
    };

    eventList.appendChild(li);
  });
}

</script>

</body>
</html>
