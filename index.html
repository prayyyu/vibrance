<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_pWzRpFgKMwYNwgefDqAHqSU4T4Cpksc",
  authDomain: "vibrance-5e4f4.firebaseapp.com",
  projectId: "vibrance-5e4f4",
};

// ✅ Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ Get container
const container = document.getElementById("top3");

// ✅ Real-time leaderboard
onSnapshot(collection(db, "leaderboard"), (snapshot) => {

  let data = [];

  snapshot.forEach(doc => {
    data.push(doc.data());
  });

  data.sort((a, b) => b.score - a.score);

  const top3 = data.slice(0, 3);

  container.innerHTML = "";

  const medals = ["🥇", "🥈", "🥉"];

  top3.forEach((dept, index) => {
    container.innerHTML += `
      <div class="top-card rank${index+1}">
        <h2>${medals[index]}</h2>
        <h3>${dept.name}</h3>
        <p>${dept.score} Points</p>
      </div>
    `;
  });


});

</script>
