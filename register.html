<!DOCTYPE html>
<html>
<head>
  <title>SAAYA Registration</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>SAAYA Event Registration</h1>

<form>
  <label>Student Name</label><br>
  <input type="text" placeholder="Enter your name"><br><br>

  <label>Register Number</label><br>
  <input type="text" placeholder="Enter register number"><br><br>

  <label>Email</label><br>
  <input type="email" placeholder="Enter email"><br><br>

  <button onclick="showPopup()">Register</button>
</form>
<div id="popup" class="popup">
<p>✅ Registration Successful!</p>
<button onclick="closePopup()">OK</button>
</div>
<p>✔ Registration Successful (Demo)</p>
<script src="js/script.js"></script>
</body>
</html>
