<!DOCTYPE html>
<html>
<head>
  <title>Register - VIBRANCE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a href="index.html">Home</a> |
    <a href="events.html">Events</a> |
    <a href="results.html">Results</a>
  </nav>

  <div class="form-wrapper">

  <div class="form-card">

    <h2>🎉 VIBRANCE Registration</h2>

    <form id="registerForm">

      <div class="form-grid">

        <div class="input-group">
          <label>Name</label>
          <input type="text" id="name" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
          <label>Register No</label>
          <input type="text" id="reg" placeholder="Enter register number" required>
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter email" required>
        </div>

        <div class="input-group">
          <label>Department</label>
          <select id="department">
            <option>Select Department</option>
            <option>CSE</option>
            <option>ECE</option>
            <option>MECH</option>
            <option>EEE</option>
            <option>CIVIL</option>
            <option>MCA</option>
          </select>
        </div>

      </div>

      <div class="input-group full">
        <label>Event</label>
        <input type="text" id="event" readonly>
      </div>

      <button type="submit" class="register-btn">🚀 Register Now</button>

      <p id="msg"></p>

    </form>

  </div>

</div>

  <!-- Auto-fill event from URL -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const eventName = params.get("event");
    if (eventName) {
      document.getElementById("event").value = eventName;
    }
  </script>

  <!-- Firebase Backend -->
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, getDocs }  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDM-RJYuTB1-qHU75cBJOVL_W_EpQShr_Q",
    authDomain: "vibrance-fest-1310a.firebaseapp.com",
    projectId: "vibrance-fest-1310a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const form = document.getElementById("registerForm");
  const msg = document.getElementById("msg");

  // Initially hide the form (we'll show it only if user is logged in)
  form.style.display = "none";

  // Check authentication state
  onAuthStateChanged(auth, async (user) => {
  if (user) {

    form.style.display = "block";

    // 🔥 FETCH USER DATA FROM FIRESTORE
    const { doc, getDoc } = await import(
      "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"
    );

    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const data = docSnap.data();

      document.getElementById("name").value = data.name || "";
      document.getElementById("email").value = data.email || "";
      document.getElementById("reg").value = data.register || "";
      const deptMap = {
  CS: "CSE",
  EC: "ECE",
  ME: "MECH",
  EE: "EEE",
  CE: "CIVIL",
  AD: "AD"
};

document.getElementById("department").value =
  deptMap[data.department] || data.department || "";
      // 🔒 lock important fields
      document.getElementById("email").readOnly = true;
      document.getElementById("reg").readOnly = true;
    }

  } else {
    window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href);
  }
});

  // Handle form submission
  form.addEventListener("submit", async (e) => {
  e.preventDefault();
  msg.innerText = "Registering...";

  const name = document.getElementById("name").value;
  const reg = document.getElementById("reg").value;
 const regPattern = /^(VIB|LVIB)[0-9]{2}(CS|ME|EC|EE|AD|CE)[0-9]{3}$/;

if (!regPattern.test(reg)) {
  msg.innerText = "❌ Invalid Register Number (VIB23CS001 or LVIB23CS001)";
  return;
}
// ✅ Extract year
const year = reg.startsWith("LVIB") 
  ? reg.substring(4,6) 
  : reg.substring(3,5);

// 🎯 Allowed years
const allowedYears = ["23","24","25","26"];

if (!allowedYears.includes(year)) {
  msg.innerText = "❌ Only 2023–2026 batches allowed";
  return;
}
  // ✅ Auto detect department
let dept = "";

if (reg.startsWith("LVIB")) {
  dept = reg.substring(6,8); // lateral
} else {
  dept = reg.substring(5,7); // normal
}

// 🔥 Set department dropdown automatically
document.getElementById("department").value = dept;
  const email = document.getElementById("email").value;
  // ✅ Email validation
const emailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

if (!emailPattern.test(email)) {
  msg.innerText = "❌ Invalid email! Use proper Gmail (example@gmail.com)";
  return;
}
  
  const eventField = document.getElementById("event").value;
 if (!eventField) {
    msg.innerText = "❌ No event selected. Please go back to events page.";
    return;
  }

  try {
    const user = auth.currentUser;

// 🔒 LIMIT 3 EVENTS
const qAll = query(
  collection(db, "registrations"),
  where("userId", "==", user.uid)
);
const snapAll = await getDocs(qAll);

if (snapAll.size >= 3) {
  msg.innerText = "❌ You can register only for 3 events!";
  return;
}

// 🔒 CHECK SAME EVENT
const q = query(
  collection(db, "registrations"),
  where("userId", "==", user.uid),
  where("event", "==", eventField)
);

const snap = await getDocs(q);

if (!snap.empty) {
  msg.innerText = "❌ You already registered for this event!";
  return;
}

// ✅ SAVE
await addDoc(collection(db, "registrations"), {
  name,
  register: reg,
  email,
  department: dept,
  event: eventField,
  userId: user.uid,
  time: new Date()
});

    msg.innerText = "✔ Registration Successful";
    form.reset();
    document.getElementById("event").value = eventField;

  } catch (error) {
    msg.innerText = "❌ " + error.message;
    console.error(error);
  }
});
</script>
</body>
</html>
